# set scroll history to 100,000 lines
set-option -g history-limit 100000

# improve colors (truecolor passthrough for iTerm2)
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB'

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'

# enable mouse control
set -g mouse on

# Remove delay when pressing escape key
set-option -s escape-time 1

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix

# open new window in current path
bind c new-window -c "#{pane_current_path}"

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -p 25 -c "#{pane_current_path}"
unbind '"'
unbind %

# balance all panes
unbind '~'
bind '~' select-layout tiled

# force a reload of the config file
unbind r
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# start window numbers at 1 to match keyboard order with tmux order
set -g base-index 1

# start pane numbers at 1 to match keyboard order with tmux order
setw -g pane-base-index 1

######################
### DESIGN CHANGES ###
######################

# Remove date/time from statusbar
set -g status-right ''
set -g status-right-length 0

####################
### MODERN REFRESH #
####################
set -g renumber-windows on    # keep window numbers gapless
set -g focus-events on        # let nvim autoread react to external edits (Claude)
set -g set-clipboard on       # OSC52 system clipboard

# Claude Code popup (prefix + a)
bind a display-popup -E -w 80% -h 80% "claude"

####################
### PLUGINS (TPM) ##
####################
# prefix + I installs, prefix + U updates, prefix + alt+u uninstalls

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'        # community-standard defaults
set -g @plugin 'christoomey/vim-tmux-navigator'    # C-h/j/k/l across tmux + nvim
set -g @plugin 'tmux-plugins/tmux-yank'            # portable copy-mode clipboard
set -g @plugin 'tmux-plugins/tmux-resurrect'       # save/restore sessions (prefix + Ctrl-s / Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-continuum'       # auto-save every 15m + restore on tmux start
set -g @plugin 'rose-pine/tmux'                    # theme to match neovim

# rose-pine theme
set -g @rose_pine_variant 'main'

# restore the last saved environment automatically when tmux starts
set -g @continuum-restore 'on'
# include pane contents in saved/restored sessions
set -g @resurrect-capture-pane-contents 'on'

# keep this as the very last line — initializes TPM
run '~/.tmux/plugins/tpm/tpm'

